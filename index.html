<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INGU BOOK STORE — Analytics Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════
   DESIGN TOKENS — light mode base
═══════════════════════════════════ */
:root {
  --ink:#1a1208;--bark:#2d1e0f;--mahogany:#3d2b1a;--umber:#6b4c2a;
  --amber:#c4862b;--amber-2:#e09b3d;--gold:#d4a843;--gold-light:#f0c96a;
  --cream:#fdf6ec;--ivory:#fefaf3;--paper:#f7efe0;--paper-2:#ede3cf;
  --sage:#4a7c59;--sage-2:#3a6347;--rose:#c0392b;--rose-2:#e74c3c;--sky:#2471a3;
  --tx-1:#1a1208;--tx-2:#5a3e28;--tx-3:#9a7d60;--tx-inv:#fdf6ec;
  --shadow:0 4px 24px rgba(26,18,8,0.10);--shadow-lg:0 12px 48px rgba(26,18,8,0.16);
  --r:14px;--r-sm:8px;--ease:cubic-bezier(0.4,0,0.2,1);
  /* transition all color changes */
  --theme-transition: background-color 0.28s ease, color 0.28s ease, border-color 0.28s ease;
}

/* ═══════════════════════════════════
   DARK MODE
═══════════════════════════════════ */
body.dark {
  --ink:#e8ddd0;
  --bark:#100c08;
  --mahogany:#18120c;
  --umber:#c9a87c;
  --cream:#18120c;
  --ivory:#1e160e;
  --paper:#160f08;
  --paper-2:#241a10;
  --tx-1:#e8ddd0;
  --tx-2:#c9a87c;
  --tx-3:#806050;
  --tx-inv:#18120c;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg:0 12px 48px rgba(0,0,0,0.55);
}
body.dark .toast { background: #241a10; color: var(--tx-1); }
body.dark .field input,
body.dark .field select { background: var(--paper); color: var(--tx-1); border-color: var(--paper-2); }
body.dark .field input:focus,
body.dark .field select:focus { background: var(--paper-2); }
body.dark table { background: transparent; }
body.dark .total-due-box { background: linear-gradient(135deg,#100c08,#1e160e); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--tx-1);
  height:100vh;
  overflow:hidden;
  display:flex;
  transition: var(--theme-transition);
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--paper-2);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--umber);}

/* ── TOAST ── */
.toast{padding:13px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:toastIn .32s cubic-bezier(.34,1.56,.64,1) forwards;max-width:310px;border-left:3px solid transparent;background:#fff;}
.toast.success{border-left-color:var(--sage);color:var(--sage-2);}
.toast.error{border-left-color:var(--rose);color:var(--rose);}
.toast.info{border-left-color:var(--amber);color:var(--umber);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;width:100%;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:256px;background:var(--bark);display:flex;flex-direction:column;flex-shrink:0;position:relative;overflow:hidden;transition:var(--theme-transition);}
.sidebar::before{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(196,134,43,.4),transparent);}
.sidebar::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;}
.sidebar-header{padding:26px 22px 18px;border-bottom:1px solid rgba(196,134,43,.15);}
.sidebar-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--gold-light);letter-spacing:-.02em;line-height:1;}
.sidebar-tagline{font-size:10px;font-weight:500;color:rgba(253,246,236,.3);letter-spacing:.18em;text-transform:uppercase;margin-top:4px;}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto;}
.nav-group-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(253,246,236,.22);padding:10px 12px 5px;}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border:none;border-radius:var(--r-sm);background:transparent;color:rgba(253,246,236,.48);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all .18s var(--ease);margin-bottom:2px;position:relative;}
.nav-btn:hover{background:rgba(253,246,236,.06);color:rgba(253,246,236,.85);}
.nav-btn.active{background:linear-gradient(135deg,rgba(196,134,43,.22),rgba(196,134,43,.1));color:var(--gold-light);font-weight:600;}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:linear-gradient(180deg,var(--amber),var(--gold));border-radius:0 3px 3px 0;}
.nav-badge{margin-left:auto;background:var(--rose);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;line-height:1.4;}
.sidebar-footer{padding:12px 10px 18px;border-top:1px solid rgba(196,134,43,.12);}

/* ── MAIN / TOPBAR ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:60px;background:var(--ivory);border-bottom:1px solid var(--paper-2);display:flex;align-items:center;justify-content:space-between;padding:0 30px;flex-shrink:0;box-shadow:0 1px 10px rgba(26,18,8,.06);transition:var(--theme-transition);}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.02em;}
.lang-toggle{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx-2);border:1.5px solid var(--paper-2);background:none;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;}
.lang-toggle:hover{border-color:var(--amber);color:var(--amber);}
.content{flex:1;overflow-y:auto;padding:26px 30px;}

/* ── ICON TOPBAR BUTTONS ── */
.ico-btn {
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--paper-2);background:transparent;cursor:pointer;
  transition:all .18s var(--ease);color:var(--tx-2);flex-shrink:0;
}
.ico-btn:hover{border-color:var(--amber);color:var(--amber);background:rgba(196,134,43,.07);}
.ico-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(196,134,43,.1);}

/* ═══════════════════════════════════
   THEME PANEL
═══════════════════════════════════ */
.theme-overlay{
  position:fixed;inset:0;background:rgba(26,18,8,.4);z-index:7999;
  opacity:0;pointer-events:none;transition:opacity .28s ease;
  backdrop-filter:blur(2px);
}
.theme-overlay.open{opacity:1;pointer-events:auto;}

.theme-panel{
  position:fixed;top:0;right:-360px;width:340px;height:100vh;
  background:var(--ivory);border-left:1px solid var(--paper-2);
  box-shadow:-12px 0 48px rgba(26,18,8,.2);z-index:8000;
  display:flex;flex-direction:column;
  transition:right .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.theme-panel.open{right:0;}
.theme-panel-head{
  padding:20px 22px 16px;border-bottom:1px solid var(--paper-2);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.theme-panel-body{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:24px;}

.tp-section-label{
  font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;
  color:var(--tx-3);margin-bottom:12px;display:flex;align-items:center;gap:7px;
}
.tp-section-label::after{content:'';flex:1;height:1px;background:var(--paper-2);}

/* Mode toggle */
.mode-row{display:flex;gap:10px;}
.mode-btn{
  flex:1;padding:12px 8px;border-radius:var(--r-sm);border:1.5px solid var(--paper-2);
  background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:700;color:var(--tx-2);transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:7px;
}
.mode-btn:hover:not(.mode-active){border-color:var(--amber);color:var(--tx-1);}
.mode-btn.mode-active{
  background:var(--bark);border-color:var(--bark);color:var(--gold-light);
  box-shadow:0 4px 16px rgba(26,18,8,.2);
}
.mode-preview{
  width:100%;height:40px;border-radius:6px;overflow:hidden;position:relative;
  border:1px solid rgba(26,18,8,.08);
}

/* Color swatches */
.swatch-row{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.swatch:hover{transform:scale(1.1);}
.swatch.swatch-active{border-color:var(--ink);transform:scale(1.12);}

/* Preset cards */
.preset-list{display:flex;flex-direction:column;gap:8px;}
.preset-card{
  padding:11px 14px;border-radius:var(--r-sm);border:1.5px solid var(--paper-2);
  cursor:pointer;transition:all .18s;
  display:flex;align-items:center;gap:12px;
  background:transparent;
}
.preset-card:hover{border-color:var(--amber);background:rgba(196,134,43,.04);}
.preset-card.preset-active{border-color:var(--amber);background:rgba(196,134,43,.07);}
.preset-dots{display:flex;gap:4px;align-items:center;}
.pdot{width:11px;height:11px;border-radius:50%;}
.preset-info{flex:1;text-align:left;}
.preset-info strong{display:block;font-size:12px;font-weight:700;color:var(--ink);}
.preset-info span{font-size:10px;color:var(--tx-3);}

/* Custom color row */
.custom-color-row{display:flex;gap:10px;align-items:center;}
.color-picker-wrap{
  width:38px;height:38px;border-radius:var(--r-sm);overflow:hidden;
  border:1.5px solid var(--paper-2);cursor:pointer;position:relative;flex-shrink:0;
}
.color-picker-wrap input[type=color]{
  position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);
  cursor:pointer;border:none;padding:0;background:transparent;
  -webkit-appearance:none;
}

/* ── METRICS ── */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px;}
.metric-card{background:var(--ivory);border-radius:var(--r);padding:18px 20px;border:1px solid var(--paper-2);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:all .22s var(--ease);}
.metric-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.metric-card.green::before{background:linear-gradient(90deg,var(--sage),#6abf80);}
.metric-card.amber::before{background:linear-gradient(90deg,var(--amber),var(--gold-light));}
.metric-card.red::before{background:linear-gradient(90deg,var(--rose),#e57373);}
.metric-card.blue::before{background:linear-gradient(90deg,var(--sky),#5dade2);}
.metric-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.metric-card.green .metric-icon{background:rgba(74,124,89,.1);color:var(--sage);}
.metric-card.amber .metric-icon{background:rgba(196,134,43,.1);color:var(--amber);}
.metric-card.red   .metric-icon{background:rgba(192,57,43,.1);color:var(--rose);}
.metric-card.blue  .metric-icon{background:rgba(36,113,163,.1);color:var(--sky);}
.metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx-3);margin-bottom:4px;}
.metric-value{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;color:var(--ink);line-height:1;}
.metric-sub{font-size:11px;color:var(--tx-3);margin-top:5px;}

/* ── CARD ── */
.card{background:var(--ivory);border-radius:var(--r);border:1px solid var(--paper-2);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;transition:var(--theme-transition);}
.card-header{padding:16px 20px 14px;border-bottom:1px solid var(--paper-2);display:flex;align-items:center;justify-content:space-between;min-width:0;}
.card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);min-width:0;}
.card-body{padding:20px;overflow:hidden;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--paper);color:var(--tx-3);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:11px 15px;text-align:left;border-bottom:1px solid var(--paper-2);white-space:nowrap;}
td{padding:12px 15px;font-size:13px;color:var(--tx-1);border-bottom:1px solid rgba(26,18,8,.04);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover{background:var(--paper);}

/* ── FORM ── */
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
/* Prevent grid children from overflowing their columns */
.form-grid-2 > *, .form-grid-4 > *{min-width:0;}
.field{display:flex;flex-direction:column;gap:5px;min-width:0;}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx-3);}
.field input,.field select,.field textarea{
  padding:10px 13px;border:1.5px solid var(--paper-2);border-radius:var(--r-sm);
  background:var(--ivory);color:var(--ink);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;outline:none;transition:all .16s var(--ease);
  -webkit-appearance:none;
  /* Critical: prevent inputs from blowing out grid columns */
  width:100%;min-width:0;box-sizing:border-box;
}
.field input:focus,.field select:focus{border-color:var(--amber);background:var(--ivory);box-shadow:0 0 0 3px rgba(196,134,43,.1);}
.field input::placeholder{color:var(--tx-3);opacity:.6;}
select option{background:var(--ivory);color:var(--ink);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s var(--ease);letter-spacing:.02em;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn:active:not(:disabled){transform:scale(.97);}
.btn-primary{background:var(--bark);color:var(--cream);}
.btn-primary:hover:not(:disabled){background:var(--mahogany);box-shadow:0 4px 16px rgba(26,18,8,.2);transform:translateY(-1px);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover:not(:disabled){background:var(--amber-2);box-shadow:0 4px 16px rgba(196,134,43,.3);transform:translateY(-1px);}
.btn-green{background:var(--sage);color:#fff;}
.btn-green:hover:not(:disabled){background:var(--sage-2);}
.btn-red{background:var(--rose);color:#fff;}
.btn-red:hover:not(:disabled){background:var(--rose-2);}
.btn-ghost{background:transparent;color:var(--tx-2);border:1.5px solid var(--paper-2);}
.btn-ghost:hover:not(:disabled){border-color:var(--umber);color:var(--umber);background:var(--paper);}
.btn-sm{padding:6px 13px;font-size:11px;}
.btn-full{width:100%;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;}
.badge-green{background:rgba(74,124,89,.1);color:var(--sage-2);border:1px solid rgba(74,124,89,.2);}
.badge-green::before{background:var(--sage);}
.badge-red{background:rgba(192,57,43,.1);color:var(--rose);border:1px solid rgba(192,57,43,.2);}
.badge-red::before{background:var(--rose);}
.badge-amber{background:rgba(196,134,43,.1);color:var(--umber);border:1px solid rgba(196,134,43,.2);}
.badge-amber::before{background:var(--amber);}
.badge-blue{background:rgba(36,113,163,.1);color:var(--sky);border:1px solid rgba(36,113,163,.2);}
.badge-blue::before{background:var(--sky);}

/* ── MISC ── */
.progress-track{background:var(--paper-2);border-radius:4px;height:5px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .8s var(--ease);}
.total-due-box{background:linear-gradient(135deg,var(--bark),var(--mahogany));color:var(--cream);padding:18px 22px;border-radius:var(--r);text-align:center;position:relative;overflow:hidden;}
.total-due-box::before{content:'';position:absolute;top:-30px;right:-30px;width:90px;height:90px;background:rgba(196,134,43,.12);border-radius:50%;}
.total-due-label{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;opacity:.5;margin-bottom:4px;}
.total-due-value{font-family:'DM Mono',monospace;font-size:30px;font-weight:500;color:var(--gold-light);}
.cat-icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(26,18,8,.08);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.chart-wrap{height:270px;position:relative;}
.empty-state{text-align:center;padding:44px 20px;color:var(--tx-3);}
.empty-state-icon{margin-bottom:12px;opacity:.35;display:flex;justify-content:center;}
.empty-state p{font-size:13px;font-style:italic;}
.license-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
.license-card{background:var(--ivory);border:1px solid var(--paper-2);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .2s;}
.license-card:hover{box-shadow:var(--shadow-lg);}
.license-card h4{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;margin-bottom:3px;margin-top:8px;}
.capital-hero{background:linear-gradient(135deg,var(--bark) 0%,var(--mahogany) 60%,#2a1a0a 100%);border-radius:var(--r);padding:28px;color:var(--cream);position:relative;overflow:hidden;margin-bottom:18px;}
.capital-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:rgba(196,134,43,.08);border-radius:50%;}
.capital-hero::after{content:'';position:absolute;bottom:-40px;left:20px;width:120px;height:120px;background:rgba(196,134,43,.05);border-radius:50%;}
.check-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);border:1.5px solid var(--paper-2);cursor:pointer;transition:all .16s;}
.check-row:hover{border-color:var(--rose);background:rgba(192,57,43,.04);}
.check-row.checked{border-color:var(--rose);background:rgba(192,57,43,.06);}
.check-row input[type=checkbox]{accent-color:var(--rose);width:16px;height:16px;}
.search-wrap{position:relative;}
.search-wrap input{padding-left:36px;}
.search-icon-abs{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tx-3);pointer-events:none;}
.sec{animation:secIn .3s var(--ease) forwards;}
@keyframes secIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.nav-icon-wrap{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.75;}
.nav-btn.active .nav-icon-wrap{opacity:1;}
.sales-split{display:grid;gap:20px;align-items:start;}

/* ── SUPPLIER / PAYABLES ── */
.ops-split{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.how-to-box{background:linear-gradient(135deg,rgba(196,134,43,.06),rgba(196,134,43,.02));border:1px solid rgba(196,134,43,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;position:relative;overflow:hidden;}
.how-to-box::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--amber),var(--gold));}
.how-to-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.how-to-toggle h4{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--amber);display:flex;align-items:center;gap:7px;}
.how-to-body{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.how-step{display:flex;gap:11px;align-items:flex-start;}
.how-step-num{width:22px;height:22px;border-radius:50%;background:var(--amber);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.how-step-text{font-size:12px;color:var(--tx-2);line-height:1.5;}
.how-step-text strong{color:var(--ink);font-weight:700;}
.supplier-card{background:var(--ivory);border:1px solid var(--paper-2);border-radius:var(--r-sm);padding:13px 15px;display:flex;align-items:center;gap:12px;transition:all .18s;cursor:pointer;margin-bottom:8px;}
.supplier-card:hover{border-color:var(--amber);box-shadow:var(--shadow);}
.supplier-card.selected{border-color:var(--amber);background:rgba(196,134,43,.05);}
.supplier-avatar{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--bark),var(--amber));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;font-family:'Playfair Display',serif;}
.payable-row{display:flex;align-items:center;gap:10px;padding:'11px 15px';border-bottom:1px solid rgba(26,18,8,.04);}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;}
.status-pill.paid{background:rgba(74,124,89,.1);color:var(--sage-2);border:1px solid rgba(74,124,89,.2);}
.status-pill.unpaid{background:rgba(192,57,43,.08);color:var(--rose);border:1px solid rgba(192,57,43,.18);}
.summary-stat{background:var(--paper);border-radius:var(--r-sm);padding:12px 14px;border:1px solid var(--paper-2);}
.summary-stat .lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx-3);margin-bottom:4px;}
.summary-stat .val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
@media(max-width:900px){.ops-split{grid-template-columns:1fr!important;}}

/* ── HAMBURGER + MOBILE SIDEBAR OVERLAY ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:899;backdrop-filter:blur(2px);}
.sidebar-overlay.show{display:block;}
.hamburger{display:none;width:36px;height:36px;border-radius:var(--r-sm);border:1.5px solid var(--paper-2);background:transparent;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--tx-2);flex-shrink:0;transition:all .18s;}
.hamburger:hover{border-color:var(--amber);color:var(--amber);}
.hamburger span{display:block;width:14px;height:1.8px;background:currentColor;border-radius:2px;transition:all .22s;}

/* LARGE DESKTOP 1400px+ */
@media(min-width:1400px){
  .sales-split{grid-template-columns:420px 1fr!important;}
}
/* LAPTOP 900–1199px */
@media(max-width:1199px){
  .sidebar{width:220px;}
  .sales-split{grid-template-columns:320px 1fr!important;}
  .content{padding:20px 22px;}
}
/* TABLET LANDSCAPE 769–900px */
@media(max-width:900px){
  .sidebar{width:200px;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
  .form-grid-4{grid-template-columns:1fr 1fr;}
  .charts-grid{grid-template-columns:1fr;}
  .license-grid{grid-template-columns:1fr 1fr;}
  .sales-split{grid-template-columns:1fr!important;}
  .theme-panel{width:300px;}
  .topbar{padding:0 18px;}
}
/* TABLET PORTRAIT 600–768px */
@media(max-width:768px){
  .hamburger{display:flex;}
  .sidebar{position:fixed;top:0;left:-280px;height:100vh;width:270px;z-index:900;transition:left .28s cubic-bezier(.4,0,.2,1);box-shadow:8px 0 40px rgba(26,18,8,.3);}
  .sidebar.mobile-open{left:0;}
  .main{height:100vh;overflow:hidden;flex:1;}
  .content{overflow-y:auto;padding:16px 18px;}
  .topbar{padding:0 14px;height:56px;}
  .topbar-title{font-size:17px;}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .metric-card{padding:14px 15px;}
  .metric-value{font-size:18px;}
  .charts-grid{grid-template-columns:1fr;}
  .license-grid{grid-template-columns:1fr 1fr;gap:12px;}
  .sales-split{grid-template-columns:1fr!important;}
  .ops-split{grid-template-columns:1fr!important;}
  .form-grid-4{grid-template-columns:1fr 1fr;}
  .card-body{padding:16px;}
  .theme-panel{width:92vw;right:-95vw;}
  .topbar-controls{gap:6px!important;}
}
/* MOBILE 481–599px */
@media(max-width:599px){
  body{overflow:auto;height:auto;}
  .layout{flex-direction:column;height:auto;min-height:100vh;}
  .main{height:auto;overflow:visible;}
  .topbar{position:sticky;top:0;z-index:100;}
  .content{overflow:visible;padding:12px 13px;}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
  .metric-card{padding:12px 13px;}
  .metric-label{font-size:9px;}
  .metric-value{font-size:16px;}
  .metric-sub{font-size:10px;}
  .form-grid-2,.form-grid-4{grid-template-columns:1fr;}
  .charts-grid{grid-template-columns:1fr;}
  .license-grid{grid-template-columns:1fr;}
  .ops-split{grid-template-columns:1fr!important;}
  .sales-split{grid-template-columns:1fr!important;}
  .card{border-radius:10px;margin-bottom:13px;}
  .card-header{padding:12px 14px 11px;}
  .card-body{padding:13px;}
  td,th{padding:9px 10px;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .total-due-value{font-size:24px;}
  .how-step-text{font-size:11.5px;}
}
/* MOBILE SMALL ≤480px */
@media(max-width:480px){
  .topbar-title{font-size:15px;}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .metric-card{padding:11px 12px;}
  .metric-value{font-size:14px;}
  .field input,.field select{padding:9px 11px;font-size:12px;}
  .btn{font-size:12px;padding:9px 14px;}
  .btn-sm{padding:5px 10px;font-size:10.5px;}
  .card-title{font-size:13px;}
  .total-due-value{font-size:20px;}
  .theme-panel{width:99vw;}
}
/* ULTRA SMALL ≤360px */
@media(max-width:360px){
  .metrics-grid{grid-template-columns:1fr;}
  .topbar-title{font-size:13px;}
  .content{padding:10px;}
}

/* ── Toast ── */
let _toast = null;
function ToastRoot() {
  const [items, setItems] = useState([]);
  _toast = useCallback((msg,type='info')=>{
    const id=Date.now();
    setItems(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setItems(p=>p.filter(t=>t.id!==id)),3500);
  },[]);
  const icons={success:<Ico.Check s={14} c="var(--sage)"/>,error:<Ico.X s={14} c="var(--rose)"/>,info:<Ico.Info s={14} c="var(--amber)"/>};
  return <div style={{position:'fixed',top:20,right:20,zIndex:9999,display:'flex',flexDirection:'column',gap:10}}>
    {items.map(t=><div key={t.id} className={`toast ${t.type}`}><span>{icons[t.type]}</span><span>{t.msg}</span></div>)}
  </div>;
}
const toast=(msg,type)=>_toast&&_toast(msg,type);

/* ── Chart wrapper ── */
function ChartWrap({type,data,options}){
  const ref=useRef(null),inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    inst.current?.destroy();
    inst.current=new window.Chart(ref.current.getContext('2d'),{type,data,options});
    return()=>inst.current?.destroy();
  },[data]);
  return <canvas ref={ref}/>;
}

}

      root.style.setProperty('--amber-2',p.amber);

      root.style.setProperty('--rose',p.rose);
      localStorage.setItem('ig_accent',accentKey);

  },[accentKey,customColor]);

  const [inv,setInv]   = useState(()=>JSON.parse(localStorage.getItem('ig_inv')||'[]'));
  const [sales,setSales]= useState(()=>JSON.parse(localStorage.getItem('ig_sales')||'[]'));

  const [capIn,setCapIn] = useState('');
  const [srch,setSrch]   = useState('');
  /* supplier state */

  useEffect(()=>{localStorage.setItem('ig_inv',JSON.stringify(inv));},[inv]);
  useEffect(()=>{localStorage.setItem('ig_sales',JSON.stringify(sales));},[sales]);
  useEffect(()=>{localStorage.setItem('ig_exp',JSON.stringify(exp));},[exp]);
  useEffect(()=>{localStorage.setItem('ig_lic',JSON.stringify(lic));},[lic]);
  useEffect(()=>{localStorage.setItem('ig_biz',JSON.stringify(biz));},[biz]);
  useEffect(()=>{localStorage.setItem('ig_supl',JSON.stringify(suppl));},[suppl]);
  useEffect(()=>{localStorage.setItem('ig_po',JSON.stringify(po));},[po]);

  const totalRev   = sales.reduce((a,s)=>a+s.total,0);

    sales.forEach(s=>{const k=s.date.split('T')[0];if(k in d)d[k]+=s.total;});return d;
  };
  const catSales=()=>{const c={};sales.forEach(s=>{c[s.category]=(c[s.category]||0)+s.total;});return c;};

  const chartBase={
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{family:'DM Sans',size:11},color:'var(--tx-2)'}}},
    scales:{x:{grid:{color:'rgba(26,18,8,.05)'},ticks:{font:{family:'DM Sans',size:10},color:'var(--tx-3)'}},
            y:{grid:{color:'rgba(26,18,8,.05)'},ticks:{font:{family:'DM Sans',size:10},color:'var(--tx-3)'}}}
  };
  const salesChartData={
    labels:Object.keys(last7()).map(d=>new Date(d).toLocaleDateString('en',{weekday:'short',day:'numeric'})),
    datasets:[{label:'Revenue',data:Object.values(last7()),borderColor:'var(--amber)',backgroundColor:'rgba(196,134,43,0.08)',tension:0.42,fill:true,pointBackgroundColor:'var(--amber)',pointRadius:4,borderWidth:2.5}]
  };
  const catData={
    labels:Object.keys(catSales()).map(k=>(lang==='sw'?getCat(k).sw:getCat(k).label)),
    datasets:[{data:Object.values(catSales()),backgroundColor:Object.keys(catSales()).map(k=>getCat(k).color),borderWidth:0,hoverOffset:6}]
  };

  const addItem=()=>{
    if(!nItem.name.trim())return toast('Enter a product name.','error');
    if(!nItem.buyPrice||+nItem.buyPrice<=0)return toast('Enter a valid buy price.','error');
    if(!nItem.sellPrice||+nItem.sellPrice<=0)return toast('Enter a valid sell price.','error');
    if(+nItem.sellPrice<+nItem.buyPrice)return toast('Sell price cannot be less than buy price!','error');
    setInv([...inv,{id:Date.now(),...nItem,buyPrice:+nItem.buyPrice,sellPrice:+nItem.sellPrice}]);
    setNItem({name:'',category:'cat_textbook',buyPrice:'',sellPrice:''});
    toast('Product saved.','success');
  };
  const delItem=id=>{if(!window.confirm('Delete this product?'))return;setInv(inv.filter(i=>i.id!==id));toast('Product removed.','info');};
  const recSale=()=>{
    const item=inv.find(i=>i.id===+sForm.itemId);
    if(!item)return toast('Select a product.','error');
    if(!sForm.qty||sForm.qty<1)return toast('Enter a valid quantity.','error');
    const s={id:Date.now(),date:new Date().toISOString(),itemId:item.id,itemName:item.name,category:item.category,quantity:sForm.qty,unitsSold:sForm.qty,total:item.sellPrice*sForm.qty,customer:sForm.customer||'Walk-in',isDebt:sForm.isDebt};
    setSales([s,...sales]);setSForm({itemId:'',qty:1,customer:'',isDebt:false});
    toast(sForm.isDebt?'Credit sale recorded.':'Sale recorded!',sForm.isDebt?'info':'success');
  };
  const addExp=()=>{
    if(!eForm.name||!eForm.cost)return toast('Fill all fields.','error');
    setExp([...exp,{id:Date.now(),name:eForm.name,cost:+eForm.cost,date:new Date().toISOString()}]);
    setEForm({name:'',cost:''});toast('Expense recorded.','success');
  };
  const addLic=()=>{
    if(!lForm.cost||!lForm.date)return toast('Fill all fields.','error');
    const info=LICENSE_TYPES.find(l=>l.id===lForm.type);
    const next=new Date(lForm.date);next.setMonth(next.getMonth()+info.interval);
    setLic([...lic,{id:Date.now(),...lForm,cost:+lForm.cost,name:info.name,nextDue:next.toISOString().split('T')[0]}]);
    setLForm({type:'brela',cost:'',date:''});toast('License recorded.','success');
  };
  const toggleDebt=id=>{setSales(sales.map(s=>s.id===id?{...s,isDebt:!s.isDebt}:s));toast('Debt updated.','success');};
  const updateCap=()=>{if(!capIn||+capIn<0)return toast('Enter a valid amount.','error');setBiz({...biz,capital:+capIn});setCapIn('');toast('Capital updated.','success');};
  const exportCSV=()=>{
    const rows=[['Date','Item','Category','Qty','Total','Debt','Customer'],...sales.map(s=>[s.date.split('T')[0],s.itemName,s.category,s.quantity,s.total,s.isDebt?'YES':'NO',s.customer])];
    const csv='data:text/csv;charset=utf-8,'+rows.map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');a.href=encodeURI(csv);a.download='ingu_report.csv';a.click();
    toast('Report exported.','success');
  };
  const resetAll=()=>{
    if(!window.confirm('RESET SYSTEM? All data will be permanently deleted.'))return;
    setInv([]);setSales([]);setExp([]);setLic([]);setBiz({capital:0});setSuppl([]);setPO([]);localStorage.clear();
    toast('System reset.','info');
  };

  /* ── Supplier / PO helpers ── */
  const totalPayable   = po.filter(p=>!p.paid).reduce((a,p)=>a+p.totalCost,0);
  const unpaidPOCt     = po.filter(p=>!p.paid).length;
  const totalPOSpend   = po.reduce((a,p)=>a+p.totalCost,0);
  const filtPO = selSuppl ? po.filter(p=>p.supplierId===selSuppl) : po;

  const addSupplier=()=>{
    if(!splForm.name.trim())return toast('Enter a supplier name.','error');
    setSuppl([...suppl,{id:Date.now(),...splForm}]);
    setSplForm({name:'',contact:'',notes:''});
    toast('Supplier added.','success');
  };
  const delSupplier=id=>{
    if(!window.confirm('Delete this supplier and all their orders?'))return;
    setSuppl(suppl.filter(s=>s.id!==id));
    setPO(po.filter(p=>p.supplierId!==id));
    if(selSuppl===id)setSelSuppl(null);
    toast('Supplier removed.','info');
  };
  const addPO=()=>{
    if(!poForm.supplierId)return toast('Select a supplier.','error');
    if(!poForm.item.trim())return toast('Enter item description.','error');
    if(!poForm.unitCost||+poForm.unitCost<=0)return toast('Enter a valid unit cost.','error');
    if(!poForm.qty||+poForm.qty<1)return toast('Enter a valid quantity.','error');
    const sup=suppl.find(s=>s.id===+poForm.supplierId);
    const total=+poForm.unitCost * +poForm.qty;
    setPO([{id:Date.now(),supplierId:+poForm.supplierId,supplierName:sup?.name||'Unknown',
      item:poForm.item,category:poForm.category,qty:+poForm.qty,
      unitCost:+poForm.unitCost,totalCost:total,date:poForm.date,paid:false},...po]);
    setPoForm({supplierId:poForm.supplierId,item:'',category:'cat_textbook',qty:1,unitCost:'',date:new Date().toISOString().split('T')[0]});
    toast(`Purchase order recorded — ${fmt(total)} payable.`,'info');
  };
  const togglePO=id=>{setPO(po.map(p=>p.id===id?{...p,paid:!p.paid}:p));toast('Payment status updated.','success');};
  const licSt=nextDue=>{
    const diff=Math.ceil((new Date(nextDue)-new Date())/86400000);
    if(diff<0)return{label:t.overdue,cls:'badge-red',color:'var(--rose)'};
    if(diff<30)return{label:t.dueSoon,cls:'badge-amber',color:'var(--amber)'};
    return{label:t.paid,cls:'badge-green',color:'var(--sage)'};
  };

  const saleItem  = inv.find(i=>i.id===+sForm.itemId);
  const saleTotal = saleItem?saleItem.sellPrice*sForm.qty:0;
  const filtInv   = inv.filter(i=>i.name.toLowerCase().includes(srch.toLowerCase()));

  const NAVS=[
    {group:'Overview',items:[
      {id:'dashboard',label:t.dashboard,IcoC:Ico.Dashboard},
      {id:'analytics',label:t.analytics,IcoC:Ico.Analytics},
    ]},
    {group:'Operations',items:[
      {id:'sales',label:t.salesInv,IcoC:Ico.Sale,badge:null},
      {id:'debts',label:t.debtMgmt,IcoC:Ico.Debt,badge:debtCt||null},
      {id:'suppliers',label:t.suppliersTab,IcoC:Ico.Truck,badge:unpaidPOCt||null},
    ]},
    {group:'Management',items:[
      {id:'expenses',label:t.expenses,IcoC:Ico.Expense},
      {id:'financials',label:t.financials,IcoC:Ico.Financial},
      {id:'licenses',label:t.licenses,IcoC:Ico.License},
    ]},
  ];
  const TAB_LABELS={dashboard:t.dashboard,analytics:t.analytics,sales:t.salesInv,debts:t.debtMgmt,suppliers:t.suppliersTab,expenses:t.expenses,financials:t.financials,licenses:t.licenses};
  const TAB_ICONS={dashboard:Ico.Dashboard,analytics:Ico.Analytics,sales:Ico.Sale,debts:Ico.Debt,suppliers:Ico.Truck,expenses:Ico.Expense,financials:Ico.Financial,licenses:Ico.License};
  const TabIcon = TAB_ICONS[tab];

  return <>
    <ToastRoot/>
    <ThemePanel open={pOpen} onClose={()=>setPOpen(false)}
      dark={dark} setDark={setDark}
      accentKey={accentKey} setAccentKey={setAccentKey}
      customColor={customColor} setCustomColor={setCustomColor}
      t={t}/>

    {/* Mobile sidebar overlay */}
    <div className={`sidebar-overlay${sideOpen?' show':''}`} onClick={()=>setSideOpen(false)}/>

    <div className="layout">
      {/* ═══ SIDEBAR ═══ */}
      <aside className={`sidebar${sideOpen?' mobile-open':''}`}>
        <div className="sidebar-header">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
            <div style={{width:32,height:32,background:'linear-gradient(135deg,var(--amber),var(--gold))',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Ico.Inventory s={16} c="var(--bark)"/>
            </div>
            <div className="sidebar-logo">INGU</div>
          </div>
          <div className="sidebar-tagline">Store Analytics</div>
        </div>
        <nav className="sidebar-nav">
          {NAVS.map(g=><div key={g.group}>
            <div className="nav-group-label">{g.group}</div>
            {g.items.map(item=><button key={item.id} className={`nav-btn${tab===item.id?' active':''}`} onClick={()=>{setTab(item.id);setSideOpen(false);}}>
              <span className="nav-icon-wrap"><item.IcoC s={15}/></span>
              <span>{item.label}</span>
              {item.badge&&<span className="nav-badge">{item.badge}</span>}
            </button>)}
          </div>)}
        </nav>
        <div className="sidebar-footer">
          <button className="btn btn-full btn-sm" style={{marginBottom:7,justifyContent:'flex-start',gap:8,background:'transparent',color:'rgba(253,246,236,.45)',border:'1px solid rgba(253,246,236,.1)'}} onClick={exportCSV}>
            <Ico.Download s={14}/>{t.export}
          </button>
          <button className="btn btn-full btn-sm" style={{justifyContent:'flex-start',gap:8,background:'rgba(192,57,43,.15)',color:'#e08080',border:'1px solid rgba(192,57,43,.22)'}} onClick={resetAll}>
            <Ico.Trash s={14}/>{t.reset}
          </button>
        </div>
      </aside>

      {/* ═══ MAIN ═══ */}
      <main className="main">
        <header className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {/* Hamburger — shown only on mobile via CSS */}
            <button className="hamburger" onClick={()=>setSideOpen(o=>!o)} aria-label="Menu">
              <span/><span/><span/>
            </button>
            {TabIcon&&<div style={{color:'var(--amber)'}}><TabIcon s={18}/></div>}
            <div className="topbar-title">{TAB_LABELS[tab]}</div>
          </div>

          {/* ── Topbar controls ── */}
          <div className="topbar-controls" style={{display:'flex',alignItems:'center',gap:8}}>
            {/* Dark/light toggle */}
            <button className="ico-btn" title={dark?t.light:t.dark} onClick={()=>setDark(d=>!d)}>
              {dark ? <Ico.Sun s={15}/> : <Ico.Moon s={15}/>}
            </button>
            {/* Theme palette button */}
            <button className={`ico-btn${pOpen?' active':''}`} title={t.appearance} onClick={()=>setPOpen(o=>!o)}>
              <Ico.Palette s={15}/>
            </button>
            {/* Language */}
            <button className="lang-toggle" onClick={()=>setLang(l=>l==='en'?'sw':'en')}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><Ico.Globe s={11}/>{lang==='en'?'SW':'EN'}</span>
            </button>
          </div>
        </header>

        <div className="content">

          {/* ═══ DASHBOARD ═══ */}
          {tab==='dashboard'&&<div className="sec">
            <div className="metrics-grid">
              <MCard title={t.totalRevenue}   value={fmt(totalRev)}  sub={`${sales.length} transactions`} color="amber" iconEl={<Ico.Coins s={18} c="var(--amber)"/>}/>
              <MCard title={t.netProfit}      value={fmt(netProfit)} sub={totalRev>0?`${((netProfit/totalRev)*100).toFixed(1)}% margin`:'—'} color="green" iconEl={<Ico.TrendUp s={18} c="var(--sage)"/>}/>
              <MCard title={t.totalExpenses}  value={fmt(totalExp)}  sub={`${exp.length} entries`} color="red" iconEl={<Ico.TrendDown s={18} c="var(--rose)"/>}/>
              <MCard title={t.outstandingDebts} value={fmt(totalDebt)} sub={`${debtCt} pending`} color="blue" iconEl={<Ico.AlertTriangle s={18} c="var(--sky)"/>}/>
            </div>
            <div className="card">
              <div className="card-header">
                <span className="card-title">{t.recentSales}</span>
                <span style={{fontSize:12,color:'var(--tx-3)',display:'flex',alignItems:'center',gap:5}}><Ico.Chart s={13} c="var(--tx-3)"/>{sales.length} total</span>
              </div>
              {sales.length===0?<div className="empty-state"><div className="empty-state-icon"><Ico.ShoppingBag s={40} c="var(--tx-3)"/></div><p>{t.noSales}</p></div>:
              <div className="table-wrap"><table>
                <thead><tr><th>Product</th><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>{sales.slice(0,10).map(s=>{const cat=getCat(s.category);return<tr key={s.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:9}}>
                    <div className="cat-icon-wrap" style={{background:cat.bg,color:cat.color}}><cat.Icon s={15} c={cat.color}/></div>
                    <div><div style={{fontWeight:600,fontSize:13}}>{s.itemName}</div><div style={{fontSize:11,color:'var(--tx-3)'}}>Qty:{s.quantity}</div></div>
                  </div></td>
                  <td style={{fontSize:12,color:'var(--tx-2)',fontFamily:'DM Mono,monospace'}}>{s.date.split('T')[0]}</td>
                  <td style={{fontSize:12,color:'var(--tx-2)'}}>{s.customer}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{fmt(s.total)}</td>
                  <td>{s.isDebt?<span className="badge badge-red"><Ico.AlertTriangle s={9}/>Debt</span>:<span className="badge badge-green"><Ico.Check s={9}/>Paid</span>}</td>
                </tr>;})}</tbody>
              </table></div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:14}}>
              {[
                {label:'Cost of Goods',val:fmt(totalCOGS),pct:totalRev>0?((totalCOGS/totalRev)*100).toFixed(1):0,bar:'var(--umber)',note:'of revenue',icon:<Ico.CreditCard s={14} c="var(--umber)"/>},
                {label:t.grossProfit,val:fmt(grossProfit),pct:totalRev>0?((grossProfit/totalRev)*100).toFixed(1):0,bar:'var(--sage)',note:'gross margin',icon:<Ico.TrendUp s={14} c="var(--sage)"/>},
                {label:'Inventory Size',val:`${inv.length} products`,pct:null,bar:null,note:`${exp.length} expenses · ${lic.length} licenses`,icon:<Ico.Package s={14} c="var(--amber)"/>},
              ].map((row,i)=><div key={i} className="card" style={{marginBottom:0}}>
                <div className="card-body" style={{padding:16}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}><span style={{opacity:.6}}>{row.icon}</span><div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx-3)',fontWeight:700}}>{row.label}</div></div>
                  <div style={{fontFamily:'DM Mono,monospace',fontSize:18,fontWeight:500}}>{row.val}</div>
                  {row.bar&&<><div style={{marginTop:10}}><div className="progress-track"><div className="progress-fill" style={{width:`${Math.min(+row.pct,100)}%`,background:row.bar}}/></div></div><div style={{fontSize:11,color:'var(--tx-3)',marginTop:4}}>{row.pct}% {row.note}</div></>}
                  {!row.bar&&<div style={{fontSize:11,color:'var(--tx-3)',marginTop:8}}>{row.note}</div>}
                </div>
              </div>)}
            </div>
          </div>}

          {/* ═══ ANALYTICS ═══ */}
          {tab==='analytics'&&<div className="sec">
            <div className="charts-grid">
              <div className="card" style={{marginBottom:0}}>
                <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.Analytics s={14} c="var(--amber)"/>{t.salesTrend}</span></div>
                <div className="card-body"><div className="chart-wrap"><ChartWrap type="line" data={salesChartData} options={{...chartBase,plugins:{...chartBase.plugins,legend:{display:false}}}}/></div></div>
              </div>
              <div className="card" style={{marginBottom:0}}>
                <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.Chart s={14} c="var(--amber)"/>{t.categoryDist}</span></div>
                <div className="card-body"><div className="chart-wrap"><ChartWrap type="doughnut" data={catData} options={{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{family:'DM Sans',size:11},color:'var(--tx-2)',padding:12}}}}}/></div></div>
              </div>
            </div>
            <div className="card">
              <div className="card-header"><span className="card-title">Category Breakdown</span></div>
              <div className="table-wrap"><table>
                <thead><tr><th>Category</th><th>Sales</th><th>Revenue</th><th>% Share</th></tr></thead>
                <tbody>{CATS.map(cat=>{
                  const rev=sales.filter(s=>s.category===cat.id).reduce((a,s)=>a+s.total,0);
                  const cnt=sales.filter(s=>s.category===cat.id).length;
                  if(!rev)return null;
                  return<tr key={cat.id}>
                    <td><div style={{display:'flex',alignItems:'center',gap:9}}><div className="cat-icon-wrap" style={{background:cat.bg,color:cat.color}}><cat.Icon s={15} c={cat.color}/></div><span style={{fontWeight:600}}>{lang==='sw'?cat.sw:cat.label}</span></div></td>
                    <td style={{fontFamily:'DM Mono,monospace'}}>{cnt}</td>
                    <td style={{fontFamily:'DM Mono,monospace',fontWeight:600}}>{fmt(rev)}</td>
                    <td><div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1}}><div className="progress-track"><div className="progress-fill" style={{width:`${totalRev>0?((rev/totalRev)*100).toFixed(0):0}%`,background:cat.color}}/></div></div>
                      <span style={{fontSize:12,color:'var(--tx-2)',minWidth:36,textAlign:'right'}}>{totalRev>0?((rev/totalRev)*100).toFixed(1):0}%</span>
                    </div></td>
                  </tr>;
                })}</tbody>
              </table></div>
            </div>
          </div>}

          {/* ═══ SALES & INVENTORY ═══ */}
          {tab==='sales'&&<div className="sec">
            <div className="sales-split" style={{gridTemplateColumns:'minmax(300px,380px) 1fr'}}>
              {/* LEFT: sale form */}
              <div>
                <div className="card" style={{marginBottom:14}}>
                  <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.Sale s={14} c="var(--amber)"/>{t.recordSale}</span></div>
                  <div className="card-body">
                    <div className="field" style={{marginBottom:15}}>
                      <label>{t.itemName}</label>
                      <select value={sForm.itemId} onChange={e=>setSForm({...sForm,itemId:e.target.value})}>
                        <option value="">— Select a product —</option>
                        {inv.map(i=>{const cat=getCat(i.category);return<option key={i.id} value={i.id}>{lang==='sw'?cat.sw:cat.label}: {i.name} — {fmt(i.sellPrice)}</option>;})}
                      </select>
                    </div>
                    {saleItem&&<div style={{background:'var(--paper)',borderRadius:'var(--r)',padding:18,marginBottom:15,border:'1px solid var(--paper-2)',overflow:'hidden',minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--paper-2)'}}>
                        <div style={{width:42,height:42,borderRadius:11,background:getCat(saleItem.category).bg,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--paper-2)'}}>
                          {React.createElement(getCat(saleItem.category).Icon,{s:20,c:getCat(saleItem.category).color})}
                        </div>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{saleItem.name}</div>
                          <div style={{fontSize:11,color:'var(--tx-3)'}}>Buy:{fmt(saleItem.buyPrice)} · Sell:{fmt(saleItem.sellPrice)} · Margin:{(((saleItem.sellPrice-saleItem.buyPrice)/saleItem.sellPrice)*100).toFixed(1)}%</div>
                        </div>
                      </div>
                      <div className="form-grid-2" style={{marginBottom:14,minWidth:0}}>
                        <div className="field" style={{minWidth:0}}><label>{t.quantity}</label><input type="number" min="1" value={sForm.qty} onChange={e=>setSForm({...sForm,qty:+e.target.value})}/></div>
                        <div className="field" style={{minWidth:0}}><label>{t.customer}</label><input placeholder="Optional" value={sForm.customer} onChange={e=>setSForm({...sForm,customer:e.target.value})}/></div>
                      </div>
                      <div className="total-due-box" style={{marginBottom:13}}>
                        <div className="total-due-label">{t.totalDue}</div>
                        <div className="total-due-value">{fmt(saleTotal)}</div>
                        <div style={{fontSize:11,opacity:.45,marginTop:3}}>Profit:{fmt((saleItem.sellPrice-saleItem.buyPrice)*sForm.qty)}</div>
                      </div>
                      <div className={`check-row${sForm.isDebt?' checked':''}`} onClick={()=>setSForm({...sForm,isDebt:!sForm.isDebt})}>
                        <input type="checkbox" checked={sForm.isDebt} onChange={()=>{}}/>
                        <div>
                          <div style={{fontWeight:700,color:'var(--rose)',fontSize:13,display:'flex',alignItems:'center',gap:6}}><Ico.AlertTriangle s={13} c="var(--rose)"/>{t.pending}</div>
                          <div style={{fontSize:11,color:'var(--tx-3)'}}>Mark if payment not received yet</div>
                        </div>
                      </div>
                    </div>}
                    <button className="btn btn-primary btn-full" onClick={recSale} disabled={!sForm.itemId} style={{padding:13,gap:8}}>
                      <Ico.Sale s={15} c="var(--gold-light)"/>{t.recordSale}
                    </button>
                  </div>
                </div>
                {/* Recent sales */}
                <div className="card" style={{marginBottom:0}}>
                  <div className="card-header">
                    <span className="card-title" style={{fontSize:13,display:'flex',alignItems:'center',gap:7}}><Ico.Chart s={13} c="var(--amber)"/>Recent Sales</span>
                    <span style={{fontSize:11,color:'var(--tx-3)'}}>{sales.length} total</span>
                  </div>
                  {sales.length===0?<div className="empty-state" style={{padding:'24px 20px'}}><div className="empty-state-icon"><Ico.ShoppingBag s={28} c="var(--tx-3)"/></div><p>{t.noSales}</p></div>:
                  <div style={{maxHeight:300,overflowY:'auto'}}>
                    {sales.slice(0,8).map(s=>{const cat=getCat(s.category);return(

                    </div>
                  </div>
                  {filtInv.length===0?<div className="empty-state" style={{padding:'24px 20px'}}><div className="empty-state-icon"><Ico.Package s={28} c="var(--tx-3)"/></div><p>{srch?'No products match.':t.noInventory}</p></div>:
                  <div className="table-wrap" style={{maxHeight:420,overflowY:'auto'}}>
                    <table>
                      <thead><tr><th>Product</th><th>{t.sellPrice}</th><th>{t.margin}</th><th>{t.profitPerUnit}</th><th></th></tr></thead>

                        const cat=getCat(i.category);const margin=i.sellPrice>0?(((i.sellPrice-i.buyPrice)/i.sellPrice)*100).toFixed(1):0;
                        return<tr key={i.id} style={{cursor:'pointer'}} onClick={()=>setSForm({...sForm,itemId:String(i.id)})}>
                          <td><div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="cat-icon-wrap" style={{width:28,height:28,borderRadius:7,background:cat.bg,color:cat.color}}><cat.Icon s={13} c={cat.color}/></div>

                          <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,fontSize:12}}>{fmt(i.sellPrice)}</td>
                          <td><span className={`badge ${+margin<15?'badge-red':'badge-green'}`} style={{fontSize:8}}>{margin}%</span></td>
                          <td style={{fontFamily:'DM Mono,monospace',color:'var(--sage-2)',fontSize:11,fontWeight:600}}>{fmt(i.sellPrice-i.buyPrice)}</td>

          {/* ═══ DEBTS ═══ */}

                <span className="badge badge-red" style={{marginLeft:'auto'}}>{debtCt} pending</span>

            <div className="card">
              {sales.filter(s=>s.isDebt).length===0?<div className="empty-state"><div className="empty-state-icon"><Ico.CheckCircle s={40} c="var(--sage)"/></div><p>{t.noDebts}</p></div>:

                <thead><tr><th>{t.customer}</th><th>Product</th><th>Date</th><th>Amount</th><th>Action</th></tr></thead>

                  <td style={{fontWeight:700}}>{s.customer}</td>
                  <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="cat-icon-wrap" style={{width:28,height:28,background:cat.bg,color:cat.color}}><cat.Icon s={13} c={cat.color}/></div><div><div style={{fontSize:13}}>{s.itemName}</div><div style={{fontSize:11,color:'var(--tx-3)'}}>×{s.quantity}</div></div></div></td>

                  <td><button className="btn btn-green btn-sm" onClick={()=>toggleDebt(s.id)} style={{gap:5}}><Ico.Check s={12} c="#fff"/>{t.markPaid}</button></td>
                </tr>;})}</tbody>

            </div>
          </div>}

          {/* ═══ SUPPLIERS & PAYABLES ═══ */}
          {tab==='suppliers'&&<div className="sec">

            {/* HOW TO USE */}
            <div className="how-to-box">
              <div className="how-to-toggle" onClick={()=>setHowOpen(o=>!o)}>
                <h4><Ico.Info s={13} c="var(--amber)"/>{t.howToUse} — Suppliers & Payables</h4>
                {howOpen?<Ico.ChevronUp s={15} c="var(--amber)"/>:<Ico.ChevronDown s={15} c="var(--amber)"/>}
              </div>
              {howOpen&&<div className="how-to-body">
                <div className="how-step">
                  <div className="how-step-num">1</div>
                  <div className="how-step-text"><strong>Add your Suppliers</strong> — In the left panel, register every publisher, wholesaler, or vendor you buy stock from. Include their phone so you can contact them quickly when placing orders.</div>
                </div>
                <div className="how-step">
                  <div className="how-step-num">2</div>
                  <div className="how-step-text"><strong>Record every Purchase Order</strong> — Each time you restock from a supplier, create a purchase order on the right. Enter the book/item name, quantity, and unit cost. The system calculates the total you owe.</div>
                </div>
                <div className="how-step">
                  <div className="how-step-num">3</div>
                  <div className="how-step-text"><strong>Track what you owe</strong> — All unpaid orders appear highlighted in red. The <em>Total Payable</em> banner at the top tells you your outstanding supplier liability at a glance.</div>
                </div>
                <div className="how-step">
                  <div className="how-step-num">4</div>
                  <div className="how-step-text"><strong>Mark as Paid</strong> — When you settle a supplier invoice, click <em>Mark Paid</em> on that order. It moves to your paid history so you always have a full audit trail.</div>
                </div>
                <div className="how-step">
                  <div className="how-step-num">5</div>
                  <div className="how-step-text"><strong>Filter by Supplier</strong> — Click any supplier card on the left to filter the orders table to just their transactions. Click again to clear the filter.</div>

                {lbl:'Unpaid Orders',val:unpaidPOCt,color:'var(--rose)'},

                {lbl:'Suppliers',val:suppl.length,color:'var(--sage)'},

                      <div className="field"><label>{t.supplierName}</label><input placeholder="e.g. Longhorn Publishers, Nairobi Books" value={splForm.name} onChange={e=>setSplForm({...splForm,name:e.target.value})}/></div>

                          <td style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--tx-3)'}}>{p.date}</td>

                </div>
              </div>

            </div>
          </div>}

          {/* ═══ EXPENSES ═══ */}
          {tab==='expenses'&&<div className="sec" style={{maxWidth:660,margin:'0 auto'}}>
            <div className="card">
              <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.Expense s={14} c="var(--amber)"/>Record Expense</span></div>
              <div className="card-body">
                <div style={{display:'flex',gap:11,alignItems:'flex-end'}}>
                  <div className="field" style={{flex:2}}><label>Description</label><input placeholder="e.g. Rent, Transport, Supplies" value={eForm.name} onChange={e=>setEForm({...eForm,name:e.target.value})}/></div>
                  <div className="field" style={{flex:1}}><label>Amount (TZS)</label><input type="number" placeholder="0" value={eForm.cost} onChange={e=>setEForm({...eForm,cost:e.target.value})}/></div>
                  <button className="btn btn-red" onClick={addExp} style={{marginBottom:0,flexShrink:0,gap:6}}><Ico.Plus s={14}/>Add</button>
                </div>
              </div>
            </div>
            <div className="card">
              <div className="card-header"><span className="card-title">Expense Ledger</span><span style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--rose)',fontSize:13}}>{fmt(totalExp)}</span></div>
              {exp.length===0?<div className="empty-state"><div className="empty-state-icon"><Ico.FileText s={40} c="var(--tx-3)"/></div><p>No expenses recorded.</p></div>:
              <div className="table-wrap"><table>
                <thead><tr><th>Description</th><th>Date</th><th>Amount</th><th></th></tr></thead>
                <tbody>{[...exp].reverse().map(e=><tr key={e.id}>
                  <td style={{fontWeight:600}}>{e.name}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontSize:12,color:'var(--tx-2)'}}>{e.date?e.date.split('T')[0]:'—'}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:600,color:'var(--rose)'}}>{fmt(e.cost)}</td>
                  <td><button className="btn btn-ghost btn-sm" onClick={()=>setExp(exp.filter(x=>x.id!==e.id))} style={{color:'var(--rose)',borderColor:'rgba(192,57,43,.2)',padding:'5px 9px'}}><Ico.Trash s={13} c="var(--rose)"/></button></td>
                </tr>)}</tbody>
              </table></div>}
            </div>
          </div>}

          {/* ═══ FINANCIALS ═══ */}
          {tab==='financials'&&<div className="sec">
            <div className="capital-hero">
              <div style={{position:'relative',zIndex:1}}>
                <div style={{fontSize:10,letterSpacing:'.18em',textTransform:'uppercase',opacity:.42,marginBottom:5,display:'flex',alignItems:'center',gap:6}}><Ico.Financial s={11} c="var(--cream)"/>{t.capitalTitle}</div>
                <div style={{fontFamily:'Playfair Display,serif',fontSize:36,fontWeight:700,color:'var(--gold-light)',letterSpacing:'-.02em'}}>{fmt(biz.capital)}</div>
                <div style={{fontSize:12,opacity:.4,marginTop:3}}>{t.capital}</div>
                <div style={{display:'flex',gap:9,marginTop:18,flexWrap:'wrap'}}>
                  <div className="field" style={{marginBottom:0}}><input type="number" placeholder="Enter new capital amount" value={capIn} onChange={e=>setCapIn(e.target.value)} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.18)',color:'var(--cream)',width:230,fontFamily:'DM Sans,sans-serif'}}/></div>
                  <button className="btn btn-amber" onClick={updateCap} style={{gap:6}}><Ico.Banknote s={14}/>{t.updateCapital}</button>
                </div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14,marginBottom:16}}>
              {[
                {label:t.runningCost,val:fmt(totalExp),pct:totalRev>0?Math.min((totalExp/totalRev)*100,100):0,color:'var(--rose)',note:`${totalRev>0?((totalExp/totalRev)*100).toFixed(1):0}% of revenue`,icon:<Ico.TrendDown s={16} c="var(--rose)"/>},
                {label:t.roi,val:`${biz.capital>0?((netProfit/biz.capital)*100).toFixed(1):0}%`,pct:biz.capital>0?Math.min(Math.max((netProfit/biz.capital)*100,0),100):0,color:'var(--sage)',note:`${t.balance}:${fmt(biz.capital-totalExp)}`,icon:<Ico.TrendUp s={16} c="var(--sage)"/>},
              ].map((row,i)=><div key={i} className="card" style={{marginBottom:0}}>
                <div className="card-body">
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>{row.icon}<div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx-3)',fontWeight:700}}>{row.label}</div></div>
                  <div style={{fontFamily:'DM Mono,monospace',fontSize:26,fontWeight:500,color:row.color}}>{row.val}</div>
                  <div style={{marginTop:10}}><div className="progress-track"><div className="progress-fill" style={{width:`${row.pct}%`,background:row.color}}/></div></div>
                  <div style={{fontSize:11,color:'var(--tx-3)',marginTop:5}}>{row.note}</div>
                </div>
              </div>)}
            </div>
            <div className="card">
              <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.FileText s={14} c="var(--amber)"/>Financial Summary</span></div>
              <div className="table-wrap"><table><tbody>
                {[
                  ['Total Revenue',fmt(totalRev),'var(--amber)',false],
                  ['Cost of Goods',fmt(totalCOGS),'var(--umber)',false],
                  ['Gross Profit',fmt(grossProfit),grossProfit>=0?'var(--sage)':'var(--rose)',false],
                  ['Operating Exp.',fmt(totalExp),'var(--rose)',false],
                  ['Net Profit',fmt(netProfit),netProfit>=0?'var(--sage)':'var(--rose)',true],
                  ['Outstanding Debts',fmt(totalDebt),'var(--sky)',false],
                  ['Invested Capital',fmt(biz.capital),'var(--amber)',false],
                ].map(([lbl,val,clr,bold],i)=><tr key={i} style={bold?{background:'var(--paper)'}:{}}>
                  <td style={{color:'var(--tx-2)',fontWeight:bold?700:500}}>{lbl}</td>
                  <td style={{fontFamily:'DM Mono,monospace',fontWeight:bold?700:500,color:clr,textAlign:'right'}}>{val}</td>
                </tr>)}
              </tbody></table></div>
            </div>
          </div>}

          {/* ═══ LICENSES ═══ */}
          {tab==='licenses'&&<div className="sec">
            <div className="card" style={{maxWidth:620,marginBottom:22}}>
              <div className="card-header"><span className="card-title" style={{display:'flex',alignItems:'center',gap:8}}><Ico.License s={14} c="var(--amber)"/>{t.addLicense}</span></div>
              <div className="card-body">
                <div className="field" style={{marginBottom:13}}><label>{t.licenseType}</label><select value={lForm.type} onChange={e=>setLForm({...lForm,type:e.target.value})}>{LICENSE_TYPES.map(l=><option key={l.id} value={l.id}>{l.name} ({l.label})</option>)}</select></div>
                <div className="form-grid-2" style={{marginBottom:12}}>
                  <div className="field"><label>{t.licenseCost}</label><input type="number" placeholder="0" value={lForm.cost} onChange={e=>setLForm({...lForm,cost:e.target.value})}/></div>
                  <div className="field"><label>{t.paymentDate}</label><input type="date" value={lForm.date} onChange={e=>setLForm({...lForm,date:e.target.value})}/></div>
                </div>
                <div style={{fontSize:12,color:'var(--tx-3)',fontStyle:'italic',marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
                  <Ico.Info s={13} c="var(--tx-3)"/>Renewal reminder based on {LICENSE_TYPES.find(l=>l.id===lForm.type)?.label?.toLowerCase()} cycle.
                </div>
                <button className="btn btn-primary" onClick={addLic} style={{gap:7}}><Ico.Calendar s={14} c="var(--gold-light)"/>{t.addLicense}</button>
              </div>
            </div>
            {lic.length===0?<div className="empty-state"><div className="empty-state-icon"><Ico.License s={40} c="var(--tx-3)"/></div><p>No license records yet.</p></div>:
            <div className="license-grid">{lic.map(l=>{
              const st=licSt(l.nextDue);
              return<div key={l.id} className="license-card">
                <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:st.color,borderRadius:'var(--r) var(--r) 0 0'}}/>
                <div style={{marginBottom:6,display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:28,height:28,borderRadius:7,background:`${st.color}18`,display:'flex',alignItems:'center',justifyContent:'center'}}><Ico.License s={14} c={st.color}/></div>
                  <span className={`badge ${st.cls}`}>{st.label}</span>
                </div>
                <h4>{l.name}</h4>
                <div style={{fontSize:12,color:'var(--tx-3)',marginBottom:14,display:'flex',alignItems:'center',gap:5}}><Ico.Calendar s={11} c="var(--tx-3)"/>Paid:{l.date}</div>
                <div style={{borderTop:'1px solid var(--paper-2)',paddingTop:12,display:'flex',justifyContent:'space-between'}}>
                  <div><div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx-3)',marginBottom:2}}>{t.nextDue}</div><div style={{fontFamily:'DM Mono,monospace',fontSize:12,fontWeight:600,color:st.color}}>{l.nextDue}</div></div>
                  <div style={{textAlign:'right'}}><div style={{fontSize:9,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx-3)',marginBottom:2}}>Cost</div><div style={{fontFamily:'DM Mono,monospace',fontSize:12,fontWeight:600}}>{fmt(l.cost)}</div></div>
                </div>
              </div>;
            })}</div>}
          </div>}

        </div>
      </main>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
